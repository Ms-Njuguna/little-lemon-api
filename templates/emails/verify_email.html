<div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; max-width: 600px; margin: auto; border: 1px solid #eee; padding: 20px; border-top: 10px solid #F4CE14; text-align: center;">

    <p style="text-align: left;">Hi <strong>{{ full_name }}</strong>,</p>
